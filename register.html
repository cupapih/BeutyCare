<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>Daftar - BeautyCare</title>
  <style>
    .auth-page { max-width: 400px; margin: 60px auto; padding: 0 20px; }
    .auth-card { background: #fff; padding: 32px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .auth-card h1 { text-align:center; font-size:1.4rem; color:#4a4a4a; margin-bottom:4px; }
    .auth-card p { text-align:center; color:#888; font-size:0.9rem; margin-bottom:24px; }
    .auth-card .form-group { margin-bottom:16px; }
    .auth-card label { display:block; font-size:0.85rem; font-weight:600; color:#555; margin-bottom:4px; }
    .auth-card input { width:100%; padding:11px 14px; border:1.5px solid #e0ddd8; border-radius:12px; font-size:0.95rem; box-sizing:border-box; transition:0.2s; }
    .auth-card input:focus { outline:none; border-color:deeppink; }
    .auth-card .btn-submit { width:100%; padding:13px; border:none; border-radius:999px; background:deeppink; color:#fff; font-weight:700; font-size:1rem; cursor:pointer; transition:0.25s; margin-top:4px; }
    .auth-card .btn-submit:hover { background:#c0006e; }
    .auth-card .link { text-align:center; margin-top:16px; font-size:0.9rem; color:#888; }
    .auth-card .link a { color:deeppink; text-decoration:none; font-weight:600; }
    .auth-card .error-msg { background:#fff0f0; color:#e74c3c; padding:10px 14px; border-radius:10px; font-size:0.85rem; margin-bottom:16px; display:none; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:#888; text-decoration:none; font-size:0.85rem; margin-bottom:20px; }
    .back-link:hover { color:deeppink; }
  </style>
</head>
<body>
<header>
  <div class="logo">BeautyCare</div>
  <nav>
    <ul>
      <li><a href="index.html">Beranda</a></li>
      <li><a href="account.html">Akun Saya</a></li>
    </ul>
  </nav>
</header>
<div class="auth-page">
  <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
  <div class="auth-card">
    <h1>Daftar Akun</h1>
    <p>Buat akun untuk mulai berbelanja</p>
    <div class="error-msg" id="error-msg"></div>
    <form id="form-register">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" required placeholder="Nama Anda">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="nama@email.com">
      </div>
      <div class="form-group">
        <label>Nomor HP</label>
        <input type="tel" id="no_hp" placeholder="08xxxxxxxxxx">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required minlength="6" placeholder="Min. 6 karakter">
      </div>
      <button type="submit" class="btn-submit" id="btn-register">Daftar</button>
    </form>
    <p class="link">Sudah punya akun? <a href="login.html">Login</a></p>
  </div>
</div>
<script>
document.getElementById('form-register').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-register');
  const errEl = document.getElementById('error-msg');
  btn.textContent = 'Memproses...';
  btn.disabled = true;
  errEl.style.display = 'none';
  try {
    const res = await fetch('api/auth.php?action=register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nama: document.getElementById('nama').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        no_hp: document.getElementById('no_hp').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('bcare_token', data.token);
      localStorage.setItem('bcare_user', JSON.stringify(data.user));
      window.location.href = 'account.html';
    } else {
      errEl.textContent = data.error || 'Pendaftaran gagal';
      errEl.style.display = 'block';
    }
  } catch {
    errEl.textContent = 'Gagal terhubung ke server.';
    errEl.style.display = 'block';
  } finally {
    btn.textContent = 'Daftar';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
